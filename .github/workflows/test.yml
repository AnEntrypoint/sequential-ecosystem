name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    - name: Run sequential-validators tests
      run: cd packages/sequential-validators && npm test
    - name: Run sequential-storage-utils tests
      run: cd packages/sequential-storage-utils && npm test
    - name: Run sequential-adaptor tests
      run: cd packages/sequential-adaptor && npm test
    - name: Run sequential-adaptor-sqlite tests
      run: cd packages/sequential-adaptor-sqlite && npm test
    - name: Run sequential-utils tests
      run: cd packages/sequential-utils && npm test
    - name: Run sequential-logging tests
      run: cd packages/sequential-logging && npm test
    - name: Test summary
      if: always()
      run: echo "All test suites completed - 303 tests total"
