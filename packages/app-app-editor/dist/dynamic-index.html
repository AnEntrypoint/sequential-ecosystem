<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Editor - Dynamic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #e0e0e0; }
    #app { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { AppRenderer } from '@sequential/dynamic-components';

    const renderer = new AppRenderer(document.getElementById('app'));

    function render() {
      const ui = {
        type: 'iframe',
        style: {
          width: '100%',
          height: '100%',
          border: 'none'
        },
        src: './index.html'
      };

      const iframeContainer = document.createElement('div');
      iframeContainer.style.cssText = 'width: 100%; height: 100%;';

      const iframe = document.createElement('iframe');
      iframe.src = './index.html';
      iframe.style.cssText = 'width: 100%; height: 100%; border: none;';
      iframeContainer.appendChild(iframe);

      const appDiv = document.getElementById('app');
      appDiv.innerHTML = '';
      appDiv.appendChild(iframeContainer);

      requestAnimationFrame(render);
    }

    render();
  </script>
</body>
</html>
