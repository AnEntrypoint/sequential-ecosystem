<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>File Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; }
    .header { background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%); padding: 12px 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
    .header h2 { font-size: 18px; font-weight: 500; }
    .path { background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 4px; font-size: 12px; font-family: monospace; }
    .main { flex: 1; display: grid; grid-template-columns: 250px 1fr 300px; gap: 1px; background: #333; overflow: hidden; }
    .panel { background: #252526; overflow: auto; }
    .panel-header { background: #3c3c3c; padding: 10px 15px; border-bottom: 1px solid #444; font-weight: 500; font-size: 13px; }
    .tree { padding: 10px; }
    .tree-item { padding: 6px 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; user-select: none; }
    .tree-item:hover { background: #2d2d30; }
    .tree-item.selected { background: #37373d; border-left: 2px solid #43cea2; }
    .tree-item.folder { font-weight: 500; }
    .tree-indent { width: 16px; }
    .tree-icon { width: 16px; text-align: center; }
    .file-list { padding: 15px; }
    .file-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: #2d2d30; border-radius: 4px; margin-bottom: 8px; cursor: pointer; }
    .file-item:hover { background: #37373d; }
    .file-item.selected { background: #37373d; border-left: 2px solid #43cea2; }
    .file-icon { font-size: 24px; }
    .file-info { flex: 1; }
    .file-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .file-meta { font-size: 11px; color: #858585; }
    .actions { display: flex; gap: 8px; }
    button { padding: 6px 12px; background: #43cea2; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 12px; font-weight: 500; }
    button:hover { background: #3ab896; }
    button.secondary { background: #666; }
    button.secondary:hover { background: #777; }
    .preview { padding: 20px; display: flex; flex-direction: column; }
    .preview-content { background: #2d2d30; padding: 20px; border-radius: 6px; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.6; max-height: 500px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
    .preview-image { max-width: 100%; max-height: 500px; border-radius: 6px; object-fit: contain; }
    .empty { color: #666; text-align: center; padding: 40px; font-size: 13px; }
    .error { color: #f48771; }
    .toolbar { display: flex; gap: 8px; }
    .code-keyword { color: #569cd6; font-weight: bold; }
    .code-string { color: #ce9178; }
    .code-number { color: #b5cea8; }
    .code-comment { color: #6a9955; }
    .code-function { color: #dcdcaa; }
    .code-property { color: #9cdcfe; }
    .code-operator { color: #d4d4d4; }
    button.delete { background: #f48771; }
    button.delete:hover { background: #d4453e; }
    .input-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .input-modal.active { display: flex; }
    .input-modal-content { background: #252526; padding: 20px; border-radius: 6px; border: 1px solid #3c3c3c; }
    .input-modal-content input { width: 300px; padding: 8px 12px; background: #3c3c3c; border: 1px solid #444; color: #d4d4d4; border-radius: 4px; font-size: 13px; margin-bottom: 15px; }
    .input-modal-content input:focus { outline: none; border-color: #43cea2; }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
    .toast { padding: 12px 16px; margin-bottom: 8px; border-radius: 4px; font-size: 13px; max-width: 300px; word-wrap: break-word; animation: slideIn 0.3s ease-out; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    @keyframes slideIn { from { transform: translateX(350px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { to { transform: translateX(350px); opacity: 0; } }
    .toast.success { background: #4caf50; color: white; }
    .toast.error { background: #f48771; color: white; }
    .toast.warning { background: #ff9800; color: white; }
    .toast.info { background: #2196F3; color: white; }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="header">
    <h2>📁 File Browser</h2>
    <div style="display: flex; align-items: center; gap: 20px;">
      <div class="path" id="currentPath">/</div>
      <div class="toolbar">
        <button onclick="showCreateFileModal()">+ File</button>
        <button onclick="showCreateDirModal()">+ Folder</button>
        <button id="renameBtn" onclick="showRenameModal()" style="display: none;">✏️ Rename</button>
        <button id="copyBtn" onclick="showCopyModal()" style="display: none;">📋 Copy</button>
        <button class="delete" id="deleteBtn" onclick="deleteSelected()" style="display: none;">🗑️ Delete</button>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="panel">
      <div class="panel-header">Directory Tree</div>
      <div class="tree" id="tree"></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span>Files</span>
        <div class="actions" style="display: inline; float: right;">
          <button onclick="refresh()">🔄</button>
        </div>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>
    <div class="panel">
      <div class="panel-header">Preview</div>
      <div class="preview" id="preview">
        <div class="empty">Select a file to preview</div>
      </div>
    </div>
  </div>
  <div class="input-modal" id="createFileModal">
    <div class="input-modal-content">
      <h3 style="margin-bottom: 10px; color: #d4d4d4;">Create File</h3>
      <input type="text" id="createFileName" placeholder="filename.txt" onkeypress="if(event.key==='Enter') createFile()">
      <div class="modal-buttons">
        <button class="secondary" onclick="closeCreateFileModal()">Cancel</button>
        <button onclick="createFile()">Create</button>
      </div>
    </div>
  </div>
  <div class="input-modal" id="createDirModal">
    <div class="input-modal-content">
      <h3 style="margin-bottom: 10px; color: #d4d4d4;">Create Folder</h3>
      <input type="text" id="createDirName" placeholder="folder-name" onkeypress="if(event.key==='Enter') createDir()">
      <div class="modal-buttons">
        <button class="secondary" onclick="closeCreateDirModal()">Cancel</button>
        <button onclick="createDir()">Create</button>
      </div>
    </div>
  </div>
  <div class="input-modal" id="renameModal">
    <div class="input-modal-content">
      <h3 style="margin-bottom: 10px; color: #d4d4d4;">Rename</h3>
      <input type="text" id="renameName" placeholder="new-name" onkeypress="if(event.key==='Enter') renameFile()">
      <div class="modal-buttons">
        <button class="secondary" onclick="closeRenameModal()">Cancel</button>
        <button onclick="renameFile()">Rename</button>
      </div>
    </div>
  </div>
  <div class="input-modal" id="copyModal">
    <div class="input-modal-content">
      <h3 style="margin-bottom: 10px; color: #d4d4d4;">Copy</h3>
      <input type="text" id="copyName" placeholder="copy-name" onkeypress="if(event.key==='Enter') copyFile()">
      <div class="modal-buttons">
        <button class="secondary" onclick="closeCopyModal()">Cancel</button>
        <button onclick="copyFile()">Copy</button>
      </div>
    </div>
  </div>
  <script type="module">
    let zellous = null;
    let currentPath = '/';
    let selectedFile = null;
    let fileTree = {};
    let collaboratorPaths = new Map();
    let myUserId = null;
    let fileWs = null;
    let wsRetryCount = 0;
    let wsMaxRetries = 10;

    function showToast(message, type = 'info', duration = 3000) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease-out forwards';
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }

    function showError(message) { showToast(message, 'error'); }
    function showSuccess(message) { showToast(message, 'success'); }
    function showWarning(message) { showToast(message, 'warning'); }

    function connectToFileSync() {
      const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      fileWs = new WebSocket(`${wsProtocol}//${window.location.host}/api/files/subscribe`);

      fileWs.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'connected') {
            console.log('Connected to file sync');
            wsRetryCount = 0;
          } else if (['file-created', 'file-modified', 'file-deleted', 'file-renamed', 'file-copied', 'directory-created'].includes(data.type)) {
            loadFiles();
          }
        } catch (e) {
          console.error('File sync error:', e);
        }
      };

      fileWs.onerror = () => {
        console.warn('File sync connection lost');
        fileWs = null;
        if (wsRetryCount >= wsMaxRetries) {
          console.error('Max WebSocket retries exceeded');
          return;
        }
        const delay = Math.min(1000 * Math.pow(2, wsRetryCount), 30000);
        wsRetryCount++;
        setTimeout(connectToFileSync, delay);
      };
    }

    async function initializePath() {
      try {
        const res = await fetch('/api/files/current-path');
        if (res.ok) {
          const data = await res.json();
          currentPath = data.path || '/';
        }
      } catch (e) {
        console.warn('Failed to load initial path:', e);
        currentPath = '/';
      }
    }

    async function init() {
      await initializePath();

      try {
        const { ZellousSDK } = await import('@sequential/zellous-client-sdk');
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}`;
        zellous = new ZellousSDK({ serverUrl: wsUrl });
        await zellous.connect();
        myUserId = zellous.getUserId?.() || 'user-' + Math.random().toString(36).slice(2, 9);
        await zellous.joinRoom('file-browser');

        zellous.on('message', handleMessage);
        zellous.on('user-joined', () => loadFiles());
      } catch (e) {
        console.error('Zellous failed:', e);
      }

      connectToFileSync();
      await loadFiles();
    }

    async function loadFiles() {
      try {
        const res = await fetch(`/api/files/list?dir=${encodeURIComponent(currentPath)}`);

        if (!res.ok) {
          showError('Failed to load files');
          return;
        }

        const data = await res.json();
        fileTree = {};
        data.files.forEach(file => {
          fileTree[file.name] = {
            name: file.name,
            isDirectory: file.isDirectory,
            size: file.size,
            modified: new Date(file.modified).toLocaleDateString(),
            type: file.type
          };
        });

        renderFileList();
        renderTree();

        if (zellous) {
          zellous.broadcastState('file-browser', { path: currentPath, timestamp: Date.now() });
        }
      } catch (e) {
        console.error('Failed to load files:', e);
        showError('Error: ' + e.message);
      }
    }

    function getCollaboratorsInPath(path) {
      return Array.from(collaboratorPaths.entries())
        .filter(([userId, info]) => info.path === path && userId !== myUserId)
        .map(([userId]) => userId);
    }

    function renderFileList() {
      const panel = document.getElementById('fileList');
      const files = Object.values(fileTree);

      if (files.length === 0) {
        panel.innerHTML = '<div class="empty">No files</div>';
        return;
      }

      const collabCount = getCollaboratorsInPath(currentPath).length;
      const collabBanner = collabCount > 0 ? `<div style="background: rgba(67, 206, 162, 0.1); padding: 8px; margin-bottom: 8px; border-radius: 4px; font-size: 11px; color: #43cea2;">👥 ${collabCount} collaborator${collabCount === 1 ? '' : 's'} browsing this directory</div>` : '';

      panel.innerHTML = collabBanner + files.map(f => `
        <div class="file-item" onclick="selectFile('${f.name.replace(/'/g, "\\'")}')">
          <div class="file-icon">${f.isDirectory ? '📁' : '📄'}</div>
          <div class="file-info">
            <div class="file-name">${escapeHtml(f.name)}</div>
            <div class="file-meta">${f.size} • ${f.modified}</div>
          </div>
          <div class="actions">
            ${f.isDirectory ? `<button onclick="navigate('${f.name.replace(/'/g, "\\'")}', event)">Open</button>` : `<button class="secondary" onclick="preview('${f.name.replace(/'/g, "\\'")}', event)">View</button>`}
          </div>
        </div>
      `).join('');
    }

    function renderTree() {
      const panel = document.getElementById('tree');
      const parts = currentPath.split('/').filter(Boolean);

      let html = '<div class="tree-item folder" onclick="navigate(\'/\', event)">📁 /</div>';
      let path = '';

      parts.forEach((part, i) => {
        path += '/' + part;
        const indent = '&nbsp;'.repeat(i * 4);
        html += `<div class="tree-item folder" onclick="navigate('${path}', event)">${indent}📁 ${part}</div>`;
      });

      panel.innerHTML = html;
    }

    async function navigate(path, event) {
      if (event) event.stopPropagation();

      if (path === '/') {
        currentPath = '/';
      } else if (path.startsWith('/')) {
        currentPath = path;
      } else {
        currentPath = currentPath === '/' ? `/${path}` : `${currentPath}/${path}`;
      }

      document.getElementById('currentPath').textContent = currentPath;

      if (zellous && myUserId) {
        zellous.sendMessage({ type: 'file-browsing', path: currentPath, userId: myUserId, timestamp: Date.now() });
        collaboratorPaths.set(myUserId, { path: currentPath, timestamp: Date.now() });
      }

      await loadFiles();
    }

    function selectFile(name) {
      selectedFile = fileTree[name];
      if (!selectedFile) return;
      document.querySelectorAll('.file-item').forEach(el => el.classList.remove('selected'));
      const el = event?.target?.closest?.('.file-item');
      if (el) el.classList.add('selected');
      const deleteBtn = document.getElementById('deleteBtn');
      const renameBtn = document.getElementById('renameBtn');
      const copyBtn = document.getElementById('copyBtn');
      if (deleteBtn) deleteBtn.style.display = 'inline-block';
      if (renameBtn) renameBtn.style.display = 'inline-block';
      if (copyBtn) copyBtn.style.display = 'inline-block';
    }

    function highlightCode(content, filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const codeExtensions = ['js', 'ts', 'jsx', 'tsx', 'json', 'py', 'java', 'cpp', 'c', 'html', 'css', 'xml', 'sh', 'bash', 'yml', 'yaml'];

      if (!codeExtensions.includes(ext)) {
        return escapeHtml(content);
      }

      let highlighted = escapeHtml(content);
      const keywords = ['function', 'const', 'let', 'var', 'if', 'else', 'for', 'while', 'return', 'class', 'import', 'export', 'async', 'await', 'def', 'if', 'else', 'for', 'while', 'true', 'false', 'null', 'undefined'];

      keywords.forEach(kw => {
        const regex = new RegExp(`\\b${kw}\\b`, 'g');
        highlighted = highlighted.replace(regex, `<span class="code-keyword">${kw}</span>`);
      });

      highlighted = highlighted.replace(/(['"])([^\\1]*?)\1/g, '<span class="code-string">$1$2$1</span>');
      highlighted = highlighted.replace(/\b(\d+)\b/g, '<span class="code-number">$1</span>');
      highlighted = highlighted.replace(/\/\/.*/g, (match) => `<span class="code-comment">${match}</span>`);
      highlighted = highlighted.replace(/#.*/g, (match) => `<span class="code-comment">${match}</span>`);

      return highlighted;
    }

    async function preview(name, event) {
      if (event) event.stopPropagation();

      const file = fileTree?.[name];
      if (!file || file.isDirectory) return;

      const filePath = currentPath === '/' ? `/${name}` : `${currentPath}/${name}`;
      const ext = name.split('.').pop().toLowerCase();
      const imageExtensions = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'bmp'];

      try {
        const panel = document.getElementById('preview');
        const res = await fetch(`/api/files/read?path=${encodeURIComponent(filePath)}`);

        if (!res.ok) {
          showError('Failed to preview file');
          return;
        }

        const data = await res.json();

        if (imageExtensions.includes(ext)) {
          const validPath = filePath.startsWith('/') ? filePath : `/${filePath}`;
          const dataUrl = `data:image/${ext === 'jpg' ? 'jpeg' : ext};base64,${btoa(data.content)}`;
          panel.innerHTML = `<div style="text-align: center;"><img class="preview-image" src="${dataUrl}" alt="${escapeHtml(name)}" onerror="this.parentElement.innerHTML='<div style=\"color:#f48771;padding:20px;\">Failed to load image</div>';"><p style="margin-top: 10px; color: #8b92b0; font-size: 12px;">${escapeHtml(name)}</p></div>`;
        } else {
          const highlighted = highlightCode(data.content, name);
          panel.innerHTML = `<div class="preview-content">${highlighted}</div>`;
        }

        if (zellous) {
          zellous.broadcastState('file-browser', { selectedFile: filePath, timestamp: Date.now() });
        }
      } catch (e) {
        console.error('Preview failed:', e);
        showError('Error: ' + e.message);
      }
    }

    function showError(message) {
      const panel = document.getElementById('fileList');
      panel.innerHTML = `<div class="empty error">${escapeHtml(message)}</div>`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function handleMessage(data) {
      if (data.type === 'file-browsing') {
        if (data.userId && data.userId !== myUserId) {
          collaboratorPaths.set(data.userId, { path: data.path, timestamp: data.timestamp });
          renderFileList();
        }
      }
    }

    function notifyCollaboratorNavigation() {
      if (zellous) {
        zellous.broadcastState('file-browser', {
          path: currentPath,
          action: 'browsing',
          timestamp: Date.now()
        });
      }
    }

    function showCreateFileModal() {
      document.getElementById('createFileModal').classList.add('active');
      document.getElementById('createFileName').focus();
    }

    function closeCreateFileModal() {
      document.getElementById('createFileModal').classList.remove('active');
      document.getElementById('createFileName').value = '';
    }

    function showCreateDirModal() {
      document.getElementById('createDirModal').classList.add('active');
      document.getElementById('createDirName').focus();
    }

    function closeCreateDirModal() {
      document.getElementById('createDirModal').classList.remove('active');
      document.getElementById('createDirName').value = '';
    }

    async function createFile() {
      const name = document.getElementById('createFileName').value.trim();
      if (!name) {
        showError('Please enter a filename');
        return;
      }

      try {
        const filePath = currentPath === '/' ? `/${name}` : `${currentPath}/${name}`;
        const res = await fetch('/api/files/write', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: filePath, content: '' })
        });

        if (!res.ok) {
          const error = await res.json();
          showError('Error creating file: ' + (error.error?.message || error.error || 'Unknown error'));
          return;
        }

        showSuccess('File created successfully');
        closeCreateFileModal();
        await loadFiles();
      } catch (e) {
        showError('Error: ' + e.message);
      }
    }

    async function createDir() {
      const name = document.getElementById('createDirName').value.trim();
      if (!name) {
        showError('Please enter a folder name');
        return;
      }

      try {
        const dirPath = currentPath === '/' ? `/${name}` : `${currentPath}/${name}`;
        const res = await fetch('/api/files/mkdir', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: dirPath })
        });

        if (!res.ok) {
          const error = await res.json();
          showError('Error creating folder: ' + (error.error?.message || error.error || 'Unknown error'));
          return;
        }

        showSuccess('Folder created successfully');
        closeCreateDirModal();
        await loadFiles();
      } catch (e) {
        showError('Error: ' + e.message);
      }
    }

    async function deleteSelected() {
      if (!selectedFile) {
        showError('Please select a file or folder');
        return;
      }

      const confirmed = confirm(`Delete "${selectedFile.name}"?`);
      if (!confirmed) return;

      try {
        const filePath = currentPath === '/' ? `/${selectedFile.name}` : `${currentPath}/${selectedFile.name}`;
        const res = await fetch('/api/files', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: filePath, confirm: true })
        });

        if (!res.ok) {
          const error = await res.json();
          showError('Error deleting: ' + (error.error?.message || error.error || 'Unknown error'));
          return;
        }

        showSuccess('Deleted successfully');
        selectedFile = null;
        document.getElementById('deleteBtn').style.display = 'none';
        document.getElementById('renameBtn').style.display = 'none';
        document.getElementById('copyBtn').style.display = 'none';
        await loadFiles();
      } catch (e) {
        showError('Error: ' + e.message);
      }
    }

    function showRenameModal() {
      if (!selectedFile) {
        showError('Please select a file or folder');
        return;
      }
      document.getElementById('renameName').value = selectedFile.name;
      document.getElementById('renameModal').classList.add('active');
      document.getElementById('renameName').select();
    }

    function closeRenameModal() {
      document.getElementById('renameModal').classList.remove('active');
      document.getElementById('renameName').value = '';
    }

    function showCopyModal() {
      if (!selectedFile) {
        showError('Please select a file or folder');
        return;
      }
      const ext = selectedFile.name.lastIndexOf('.') > -1 ? selectedFile.name.substring(selectedFile.name.lastIndexOf('.')) : '';
      const baseName = ext ? selectedFile.name.substring(0, selectedFile.name.lastIndexOf('.')) : selectedFile.name;
      document.getElementById('copyName').value = `${baseName}-copy${ext}`;
      document.getElementById('copyModal').classList.add('active');
      document.getElementById('copyName').select();
    }

    function closeCopyModal() {
      document.getElementById('copyModal').classList.remove('active');
      document.getElementById('copyName').value = '';
    }

    async function renameFile() {
      if (!selectedFile) {
        showError('Please select a file or folder');
        return;
      }

      const newName = document.getElementById('renameName').value.trim();
      if (!newName) {
        showError('Please enter a new name');
        return;
      }

      if (newName === selectedFile.name) {
        closeRenameModal();
        return;
      }

      try {
        const filePath = currentPath === '/' ? `/${selectedFile.name}` : `${currentPath}/${selectedFile.name}`;
        const res = await fetch('/api/files/rename', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: filePath, newName: newName })
        });

        if (!res.ok) {
          const error = await res.json();
          showError('Error renaming: ' + (error.error?.message || error.error || 'Unknown error'));
          return;
        }

        showSuccess('Renamed successfully');
        closeRenameModal();
        selectedFile = null;
        document.getElementById('renameBtn').style.display = 'none';
        document.getElementById('copyBtn').style.display = 'none';
        document.getElementById('deleteBtn').style.display = 'none';
        await loadFiles();
      } catch (e) {
        showError('Error: ' + e.message);
      }
    }

    async function copyFile() {
      if (!selectedFile) {
        showError('Please select a file or folder');
        return;
      }

      const newName = document.getElementById('copyName').value.trim();
      if (!newName) {
        showError('Please enter a copy name');
        return;
      }

      try {
        const filePath = currentPath === '/' ? `/${selectedFile.name}` : `${currentPath}/${selectedFile.name}`;
        const copyPath = currentPath === '/' ? `/${newName}` : `${currentPath}/${newName}`;
        const res = await fetch('/api/files/copy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: filePath, newPath: copyPath })
        });

        if (!res.ok) {
          const error = await res.json();
          showError('Error copying: ' + (error.error?.message || error.error || 'Unknown error'));
          return;
        }

        showSuccess('Copied successfully');
        closeCopyModal();
        selectedFile = null;
        document.getElementById('renameBtn').style.display = 'none';
        document.getElementById('copyBtn').style.display = 'none';
        document.getElementById('deleteBtn').style.display = 'none';
        await loadFiles();
      } catch (e) {
        showError('Error: ' + e.message);
      }
    }

    window.navigate = navigate;
    window.selectFile = selectFile;
    window.preview = preview;
    window.refresh = loadFiles;
    window.showCreateFileModal = showCreateFileModal;
    window.closeCreateFileModal = closeCreateFileModal;
    window.showCreateDirModal = showCreateDirModal;
    window.closeCreateDirModal = closeCreateDirModal;
    window.createFile = createFile;
    window.createDir = createDir;
    window.deleteSelected = deleteSelected;
    window.showRenameModal = showRenameModal;
    window.closeRenameModal = closeRenameModal;
    window.renameFile = renameFile;
    window.showCopyModal = showCopyModal;
    window.closeCopyModal = closeCopyModal;
    window.copyFile = copyFile;

    init();
  </script>
</body>
</html>
