<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Task Debugger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 15px; color: white; }
    .header h2 { font-size: 18px; font-weight: 500; }
    .controls { display: flex; gap: 10px; margin-top: 10px; }
    select, input, button { padding: 8px 12px; border: none; border-radius: 4px; font-size: 14px; }
    select, input { background: rgba(255,255,255,0.2); color: white; }
    select::placeholder, input::placeholder { color: rgba(255,255,255,0.7); }
    button { background: rgba(255,255,255,0.3); color: white; cursor: pointer; font-weight: 500; }
    button:hover { background: rgba(255,255,255,0.4); }
    button:active { transform: scale(0.98); }
    .main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #333; overflow: hidden; }
    .panel { background: #252526; overflow: auto; }
    .panel-header { background: #3c3c3c; padding: 10px; border-bottom: 1px solid #444; font-weight: 500; }
    .panel-content { padding: 15px; }
    .run-item { padding: 10px; border-left: 3px solid #667eea; margin-bottom: 10px; background: #2d2d30; cursor: pointer; }
    .run-item:hover { background: #37373d; }
    .run-item.error { border-left-color: #f44336; }
    .run-item.success { border-left-color: #4caf50; }
    .run-time { color: #858585; font-size: 12px; }
    .run-status { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; margin-left: 8px; }
    .run-status.success { background: #4caf50; color: white; }
    .run-status.error { background: #f44336; color: white; }
    .run-status.pending { background: #ff9800; color: white; }
    .detail-row { margin-bottom: 15px; }
    .detail-label { color: #858585; font-size: 12px; margin-bottom: 5px; }
    .detail-value { background: #1e1e1e; padding: 10px; border-radius: 4px; font-family: 'Consolas', monospace; font-size: 13px; }
    .code-viewer { background: #1e1e1e; padding: 15px; border-radius: 4px; font-family: 'Consolas', monospace; font-size: 13px; max-height: 300px; overflow: auto; }
    .test-section { background: #2d2d30; padding: 15px; border-radius: 4px; margin-bottom: 15px; }
    .test-section h3 { font-size: 14px; margin-bottom: 10px; color: #4fc3f7; }
    textarea { width: 100%; min-height: 100px; background: #1e1e1e; color: #d4d4d4; border: 1px solid #444; padding: 10px; font-family: 'Consolas', monospace; border-radius: 4px; }
    .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
    .json { color: #ce9178; }
    .keyword { color: #569cd6; }
    .string { color: #ce9178; }
    .number { color: #b5cea8; }
    .empty { color: #858585; font-style: italic; text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="header">
    <h2>🐛 Task Debugger</h2>
    <div class="controls">
      <select id="taskSelect">
        <option value="">Select task...</option>
      </select>
      <input id="inputField" placeholder='Input JSON: {"key": "value"}' style="flex: 1">
      <button onclick="runTask()">▶ Run</button>
      <button onclick="testTask()">🧪 Test</button>
      <button onclick="refreshHistory()">🔄 Refresh</button>
    </div>
  </div>
  <div class="main">
    <div class="panel">
      <div class="panel-header">Run History</div>
      <div class="panel-content" id="historyPanel">
        <div class="empty">No runs yet. Select a task and click Run.</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">Execution Details</div>
      <div class="panel-content" id="detailsPanel">
        <div class="empty">Select a run from history to view details.</div>
      </div>
    </div>
  </div>
  <script>
    let tasks = [];
    let currentRun = null;

    async function loadTasks() {
      const res = await fetch('/api/tasks');
      tasks = res.ok ? await res.json() : [];
      const select = document.getElementById('taskSelect');
      select.innerHTML = '<option value="">Select task...</option>' +
        tasks.map(t => `<option value="${t.name || t.id}">${t.name || t.id}</option>`).join('');
    }

    async function runTask() {
      const taskName = document.getElementById('taskSelect').value;
      if (!taskName) return alert('Select a task');

      let input = {};
      try {
        const inputVal = document.getElementById('inputField').value.trim();
        input = inputVal ? JSON.parse(inputVal) : {};
      } catch (e) {
        return alert('Invalid JSON input');
      }

      const res = await fetch(`/api/tasks/${taskName}/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input })
      });

      const result = await res.json();
      await refreshHistory();
      if (result.runId) selectRun(result.runId);
    }

    async function testTask() {
      const taskName = document.getElementById('taskSelect').value;
      if (!taskName) return alert('Select a task');

      document.getElementById('detailsPanel').innerHTML = `
        <div class="test-section">
          <h3>Test Input</h3>
          <textarea id="testInput" placeholder='{\n  "key": "value"\n}'></textarea>
          <div class="action-buttons">
            <button onclick="executeTest()">▶ Execute Test</button>
            <button onclick="clearTest()">Clear</button>
          </div>
        </div>
        <div id="testOutput"></div>
      `;
    }

    async function executeTest() {
      const taskName = document.getElementById('taskSelect').value;
      let input = {};
      try {
        input = JSON.parse(document.getElementById('testInput').value || '{}');
      } catch (e) {
        return alert('Invalid JSON');
      }

      const res = await fetch(`/api/tasks/${taskName}/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input })
      });

      const result = await res.json();
      document.getElementById('testOutput').innerHTML = `
        <div class="test-section">
          <h3>Test Result</h3>
          <div class="detail-value">${JSON.stringify(result, null, 2)}</div>
        </div>
      `;
    }

    function clearTest() {
      document.getElementById('testInput').value = '';
      document.getElementById('testOutput').innerHTML = '';
    }

    async function refreshHistory() {
      const taskName = document.getElementById('taskSelect').value;
      if (!taskName) return;

      const res = await fetch(`/api/tasks/${taskName}/history`);
      const runs = res.ok ? await res.json() : [];

      const panel = document.getElementById('historyPanel');
      if (runs.length === 0) {
        panel.innerHTML = '<div class="empty">No execution history</div>';
        return;
      }

      panel.innerHTML = runs.map(run => `
        <div class="run-item ${run.status === 'error' ? 'error' : 'success'}" onclick="selectRun('${run.runId}')">
          <div>
            <strong>Run ${run.runId.slice(0, 8)}</strong>
            <span class="run-status ${run.status === 'error' ? 'error' : 'success'}">${run.status === 'error' ? 'ERROR' : 'SUCCESS'}</span>
          </div>
          <div class="run-time">${new Date(run.timestamp).toLocaleString()}</div>
        </div>
      `).join('');
    }

    async function selectRun(runId) {
      const taskName = document.getElementById('taskSelect').value;
      const res = await fetch(`/api/tasks/${taskName}/runs/${runId}`);
      currentRun = res.ok ? await res.json() : null;

      if (!currentRun) return;

      const panel = document.getElementById('detailsPanel');
      panel.innerHTML = `
        <div class="detail-row">
          <div class="detail-label">Run ID</div>
          <div class="detail-value">${currentRun.runId}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Status</div>
          <div class="detail-value">${currentRun.status === 'error' ? '❌ Error' : '✅ Success'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Input</div>
          <div class="detail-value">${JSON.stringify(currentRun.input, null, 2)}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">${currentRun.status === 'error' ? 'Error' : 'Output'}</div>
          <div class="detail-value">${JSON.stringify(currentRun.output || null, null, 2)}</div>
        </div>
        <div class="action-buttons">
          <button onclick="rerunTask()">🔁 Rerun</button>
          <button onclick="rerunWithEdit()">✏️ Edit & Rerun</button>
          <button onclick="repairTask()">🔧 Repair</button>
        </div>
      `;
    }

    async function rerunTask() {
      if (!currentRun) return;
      document.getElementById('inputField').value = JSON.stringify(currentRun.input);
      await runTask();
    }

    function rerunWithEdit() {
      if (!currentRun) return;
      document.getElementById('inputField').value = JSON.stringify(currentRun.input, null, 2);
      alert('Input loaded. Edit and click Run.');
    }

    async function repairTask() {
      if (!currentRun) return;

      const panel = document.getElementById('detailsPanel');
      panel.innerHTML += `
        <div class="test-section" style="margin-top: 15px; border-left: 3px solid #ff9800;">
          <h3>🔧 Task Repair Options</h3>
          <p style="color: #a0a0a0; font-size: 13px; margin-bottom: 10px;">Choose how to handle this failed task:</p>
          <div class="action-buttons" style="flex-direction: column; gap: 8px;">
            <button onclick="repairAction('resume')" style="background: #4caf50;">▶ Resume - Rerun with same input</button>
            <button onclick="repairAction('retry')" style="background: #2196F3;">🔄 Retry - Run again immediately</button>
            <button onclick="repairAction('debug')" style="background: #ff9800;">🐛 Debug - Inspect state</button>
          </div>
        </div>
      `;
    }

    async function repairAction(action) {
      if (!currentRun) return;

      if (action === 'resume' || action === 'retry') {
        document.getElementById('inputField').value = JSON.stringify(currentRun.input);
        await runTask();
      } else if (action === 'debug') {
        const debugInfo = `Task: ${document.getElementById('taskSelect').value}
Run ID: ${currentRun.runId}
Status: ${currentRun.status}
Duration: ${currentRun.duration}ms
Input: ${JSON.stringify(currentRun.input, null, 2)}
Output: ${JSON.stringify(currentRun.output, null, 2)}`;

        document.getElementById('detailsPanel').innerHTML = `
          <div class="detail-row">
            <div class="detail-label">Debug Information</div>
            <div class="detail-value" style="white-space: pre-wrap; font-size: 12px;">${debugInfo}</div>
          </div>
          <div class="action-buttons">
            <button onclick="repairTask()">Back to Repair</button>
          </div>
        `;
      }
    }

    loadTasks();
    setInterval(() => {
      const taskName = document.getElementById('taskSelect').value;
      if (taskName) refreshHistory();
    }, 5000);
  </script>
</body>
</html>
